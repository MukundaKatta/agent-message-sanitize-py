name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile all sources
        run: python -m py_compile $(git ls-files '*.py')

      - name: Run unit tests (no dependencies required)
        run: python -m unittest discover -s tests -v

      - name: Build and install the package, then re-run tests
        run: |
          python -m pip install --upgrade pip build
          python -m build
          python -m pip install dist/*.whl
          # Run the suite again against the installed package, from a directory
          # where the local ``src/`` tree is not importable, to prove the wheel
          # ships everything (including the py.typed marker).
          cd "$RUNNER_TEMP"
          python -m unittest discover -s "$GITHUB_WORKSPACE/tests" -v
